<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">

  <link rel="icon" href="data:image/x-icon;base64,AAABAAEAEBAQAAEABAAoAQAAFgAAACgAAAAQAAAAIAAAAAEABAAAAAAAgAAAAAAAAAAAAAAAEAAAAAAAAAAAAAAAzP8AAAD//wD/AAAAAKX/AAAA/wAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAABEREREREREAAAAAAAAAAABVUAMABEQCAFBVAwAABAIAUAUDAAAEAgBQBQMAAAQCAFVVAzMERAIAUAUDAAQAAgBQBQMABAACAFBVAwAEAAIAVVADMwREAgAAAAAAAAAAABEREREREREAAAAAAAAAAAAAAAAAAAAADAAwAAgAEAAP//AACNxQAApfUAALX1AAC19QAAhEUAALXdAAC13QAApd0AAIxFAAD//wAAgAEAAMADAADgBwAA" type="image/x-icon">
	
    <title>HTML5 QR Code Scanner</title>
	
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
	<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=Outfit:wght@400;600;700&amp;display=swap" rel="stylesheet">
	
	<style>
		:root {
			--primary: #4f46e5;
			--primary-light: #818cf8;
			--primary-dark: #3730a3;
			--secondary: #10b981;
			--bg-base: #f8fafc;
			--bg-card: #ffffff;
			--text-main: #1e293b;
			--text-muted: #64748b;
			--border-color: #e2e8f0;
			--shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
			--shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
			--shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
			--radius-lg: 1rem;
			--radius-md: 0.5rem;
		}
		body {
			font-family: 'Inter', system-ui, -apple-system, sans-serif;
			color: var(--text-main);
			background-color: var(--bg-base);
			line-height: 1.6;
		}
		h1, h2, h3, h4 {
			font-family: 'Outfit', sans-serif;
			font-weight: 700;
			color: var(--text-main);
		}
		.hero-section {
			padding: 5rem 1rem 6rem 1rem;
			text-align: center;
			background: #ffffff;
			color: var(--text-main);
			border-bottom: 1px solid var(--border-color);
			margin-bottom: 0;
		}
		.hero-section h1 {
			color: var(--text-main);
			font-size: 2.75rem;
			margin-bottom: 1rem;
			letter-spacing: -0.025em;
		}
		.hero-section p {
			font-size: 1.15rem;
			color: var(--text-muted);
			max-width: 700px;
			margin: 0 auto;
		}
		.container {
			max-width: 1200px;
			margin: 0 auto;
			padding: 0 1.5rem;
		}
		.scanner-card {
			background: var(--bg-card);
			border-radius: var(--radius-lg);
			box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
			padding: 2rem;
			margin-top: -3rem;
			margin-bottom: 3rem;
			border: 1px solid var(--border-color);
			position: relative;
			z-index: 10;
		}
		#reader {
			width: 640px !important;
			margin: 0 auto;
			border: none !important;
			overflow: hidden;
			border-radius: var(--radius-md);
		}
		#reader__status_span {
			font-size: 14px;
			color: var(--text-muted);
		}
		@media(max-width: 700px) {
			#reader {
				width: 100% !important;
			}
			.hero-section h1 {
				font-size: 2rem;
			}
		}
		.results-section {
			margin-bottom: 3rem;
		}
		.result-card {
			background: var(--bg-card);
			border-radius: var(--radius-md);
			padding: 1.25rem;
			margin-bottom: 1rem;
			border-left: 4px solid var(--primary);
			box-shadow: var(--shadow-sm);
			display: flex;
			align-items: center;
			gap: 1.5rem;
			transition: transform 0.2s ease, box-shadow 0.2s ease;
			animation: slideIn 0.3s ease-out;
		}
		@keyframes slideIn {
			from { opacity: 0; transform: translateY(10px); }
			to { opacity: 1; transform: translateY(0); }
		}
		.result-card:hover {
			transform: translateY(-2px);
			box-shadow: var(--shadow-md);
		}
		.result-info {
			flex: 1;
		}
		.result-count {
			background: var(--primary);
			color: white;
			width: 32px;
			height: 32px;
			border-radius: 50%;
			display: flex;
			align-items: center;
			justify-content: center;
			font-weight: 600;
			font-size: 0.875rem;
		}
		.result-header {
			display: flex;
			justify-content: space-between;
			align-items: center;
			margin-bottom: 0.5rem;
		}
		.result-format {
			font-size: 0.75rem;
			font-weight: 700;
			text-transform: uppercase;
			color: var(--primary);
			background: #eef2ff;
			padding: 2px 8px;
			border-radius: 4px;
		}
		.result-text {
			font-family: 'Monaco', 'Consolas', monospace;
			word-break: break-all;
			font-size: 0.95rem;
			color: var(--text-main);
			background: #f1f5f9;
			padding: 0.5rem;
			border-radius: 4px;
		}
		.ad-section {
			margin-bottom: 3rem;
		}
		.ad-card {
			background: linear-gradient(to right, #ecfdf5, #ffffff);
			border: 1px solid #d1fae5;
			border-radius: var(--radius-md);
			padding: 1.5rem;
			display: flex;
			align-items: center;
			gap: 1.5rem;
		}
		.ad-card img {
			width: 80px;
			height: 80px;
			border-radius: 12px;
		}
		.ad-card strong {
			color: #065f46;
			font-size: 1.1rem;
			display: block;
			margin-bottom: 0.25rem;
		}
		.docs-section {
			display: grid;
			grid-template-columns: 1fr;
			gap: 1.5rem;
			margin-bottom: 4rem;
		}
		.docs-card {
			background: var(--bg-card);
			border-radius: var(--radius-md);
			padding: 1.5rem;
			border: 1px solid var(--border-color);
			box-shadow: var(--shadow-sm);
		}
		.docs-card h3 {
			margin-top: 0;
			font-size: 1.25rem;
			margin-bottom: 1rem;
		}
		code {
			background: #f1f5f9;
			padding: 2px 5px;
			border-radius: 4px;
			font-size: 0.875em;
			color: #0f172a;
		}
		pre code {
			display: block;
			padding: 1rem;
			overflow-x: auto;
			background: #1e293b;
			color: #e2e8f0;
			border-radius: 8px;
			line-height: 1.5;
		}
		.post-info {
			background: white;
			border-radius: var(--radius-md);
			padding: 1.5rem;
			border: 1px solid var(--border-color);
			margin-bottom: 1.5rem;
			box-shadow: var(--shadow-sm);
		}
		.post-header {
			font-size: 1.1rem;
			margin-bottom: 1rem;
		}
		.post-link {
			color: var(--primary);
			text-decoration: none;
		}
		.post-link:hover {
			text-decoration: underline;
		}
		.post-description img {
			border-radius: 8px;
			margin-right: 1.5rem;
		}
		.faq-q {
			font-weight: 600;
			color: var(--text-main);
			display: block;
			margin-bottom: 0.5rem;
		}
		.faq-a {
			color: var(--text-muted);
			margin-bottom: 1.5rem;
		}
		.styled-table {
			display: none; /* Hide old table */
		}
		#scanapp_ad {
			margin: 2rem 0;
		}
	</style>
</head>
<body>
	<div class="hero-section">
	   <div class="container">
		   <h1>HTML5 QR Code Scanner</h1>
		   <p>A fast, reliable, and lightweight QR &amp; Barcode scanning library for the web. Built with zero dependencies and cross-platform support.</p>
	   </div>
	</div>
	<div class="container">
	   <div class="scanner-card">
		    <div id="reader" style="position: relative; padding: 0px; border: 1px solid silver;">
				<div id="reader__dashboard" style="width: 100%;">
					<div id="reader__dashboard_section" style="width: 100%; padding: 10px 0px; text-align: left;">
						<div id="reader__dashboard_section_csr" style="display: block;">
							<div style="text-align: center;">
								<button id="html5-qrcode-button-camera-permission" class="html5-qrcode-element">Request Camera Permissions</button>
							</div>
						</div>
						<div style="text-align: center; margin: auto auto 10px; width: 80%; max-width: 600px; border: 6px dashed rgb(235, 235, 235); padding: 10px; display: none;">
							<label for="html5-qrcode-private-filescan-input" style="display: inline-block;">
								<button id="html5-qrcode-button-file-selection" class="html5-qrcode-element">Choose Image - No image choosen</button>
								<input id="html5-qrcode-private-filescan-input" class="html5-qrcode-element" type="file" accept="image/*" style="display: none;">
							</label>
							<div style="font-weight: 400;">
								Or drop an image to scan
							</div>
						</div>
						<div style="text-align: center;">
							<a id="html5-qrcode-anchor-scan-type-change" class="html5-qrcode-element" style="text-decoration: underline;">Scan an Image File</a>
						</div>
					</div>
				</div>
			</div>
			<div id="scanned-result"></div>
	   </div>
	</div>
	<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/highlight.min.js"></script>
	<script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
	<script>
		function docReady(fn) {
			if (document.readyState === "complete" || document.readyState === "interactive") {
				setTimeout(fn, 1);
			} else {
				document.addEventListener("DOMContentLoaded", fn);
			}
		}
		function printScanResultPretty(codeId, decodedText, decodedResult) {
			let resultSection = document.getElementById('scanned-result');
			const card = document.createElement('div');
			card.className = 'result-card';
			const count = document.createElement('div');
			count.className = 'result-count';
			count.innerText = codeId + 1;
			const info = document.createElement('div');
			info.className = 'result-info';
			const header = document.createElement('div');
			header.className = 'result-header';
			const format = document.createElement('span');
			format.className = 'result-format';
			format.innerText = decodedResult.result.format.formatName;
			const time = document.createElement('span');
			time.style.fontSize = '0.75rem';
			time.style.color = 'var(--text-muted)';
			time.innerText = new Date().toLocaleTimeString();
			header.appendChild(format);
			header.appendChild(time);
			const text = document.createElement('div');
			text.className = 'result-text';
			text.innerText = decodedText;
			info.appendChild(header);
			info.appendChild(text);
			card.appendChild(count);
			card.appendChild(info);
			// Insert at the top of the results
			resultSection.insertBefore(card, resultSection.firstChild);
			// Smooth scroll to results if it's the first one
			if (codeId === 0) {
				card.scrollIntoView({ behavior: 'smooth', block: 'center' });
			}
		}
		window.onload = () => { docReady(function() {
			// hljs.initHighlightingOnLoad(); // Deprecated as of 10.6.0. initHighlightingOnLoad() deprecated.  Use highlightAll() now.
			hljs.highlightAll();
			let lastMessage;
			let codeId = 0;
			function onScanSuccess(decodedText, decodedResult) {
				if (lastMessage !== decodedText) {
					lastMessage = decodedText;
					printScanResultPretty(codeId, decodedText, decodedResult);
					++codeId;
					// Visual feedback on success
					const reader = document.getElementById('reader');
					reader.style.outline = '4px solid var(--secondary)';
					setTimeout(() => { reader.style.outline = 'none'; }, 500);
				}
			}
			const qrboxFunction = function(viewfinderWidth, viewfinderHeight) {
				let minEdgeSizeThreshold = 250;
				let edgeSizePercentage = 0.75;
				let minEdgeSize = Math.min(viewfinderWidth, viewfinderHeight);
				let qrboxEdgeSize = Math.floor(minEdgeSize * edgeSizePercentage);
				if (qrboxEdgeSize < minEdgeSizeThreshold) {
					return {
						width: Math.min(viewfinderWidth, minEdgeSizeThreshold),
						height: Math.min(viewfinderHeight, minEdgeSizeThreshold)
					};
				}
				return { width: qrboxEdgeSize, height: qrboxEdgeSize };
			}
			const html5QrcodeScanner = new Html5QrcodeScanner(
				"reader", 
				{ 
					fps: 10,
					qrbox: qrboxFunction,
					experimentalFeatures: {
						useBarCodeDetectorIfSupported: true
					},
					rememberLastUsedCamera: true,
					showTorchButtonIfSupported: true
				});
			html5QrcodeScanner.render(onScanSuccess);
		}); };
	</script>
</body>
</html>
