                  <h3 style="color: red;">Copyright © 2019-present by Chatrawichai Chanprom | ลิขสิทธิ์และพัฒนาโดย นายชาติระวีไชย จันทร์พร้อม</h3>
                </label>
              </div>      
            </center>
            <br/>
			<p class="w3-button w3-round w3-theme-d4 w3-margin-right w3-mobile" @click="handleAuth">เข้าสู่ระบบ</p>
          </div>
        </template>
        <template v-else>
          <header class="w3-card w3-theme">
            <div class="w3-bar" v-show="!showSidebar">
              <br>
              <p class="w3-bar-item w3-mobile">
                <b>
                  <center>{{title}}</center>
                </b>
              </p>
            </div>
            <div class="w3-bar" v-show="!showSidebar">
              <p class="w3-bar-item w3-tag w3-round w3-theme-l5 w3-margin-left w3-margin-right w3-mobile">
                <input
                  class="w3-mobile w3-center"
                  type="text" 
                  style="border: none; background: #FFFFFF; outline: none; padding: 0px;" 
                  v-model="ID" 
                  placeholder="พิมพ์ ชื่อ - สกุล ของท่านที่นี้" 
                  id="ID" 
                  size="50" value="" 
                  :disabled="start"
                  required
                >
              </p>
              <template v-if="!start">
                <p class="w3-bar-item w3-button w3-round w3-theme-d4 w3-margin-left w3-margin-right w3-mobile" @click="startQuiz" >
                  เริ่มทำข้อสอบ
                </p>
              </template>
              <template v-else>
                <p class="w3-bar-item w3-button w3-round w3-theme-d4 w3-margin-left w3-margin-right w3-mobile" @click="endQuiz" >
                  ส่งคำตอบ
                </p>
                <p class="w3-bar-item w3-tag w3-round w3-theme-l4 w3-margin-left w3-margin-right w3-mobile" >
                  {{config.count}}
                  คำถาม
                </p>
                <p class="w3-bar-item w3-tag w3-round w3-theme-l4 w3-margin-left w3-margin-right w3-mobile">
                  {{timer}}
                </p>
              </template>
            </div>
          </header>
        </template>
        <main v-if="selectedQuestions">
          <br>
          <br>
          <br>
          <br>
          <br>
          <div class="w3-card w3-container w3-padding" v-for="(q, qIndex) in selectedQuestions" :key="q.id">
            <div class="question-container">
              <div class="question-text" style="padding-bottom: 20px;">
                <label class="w3-block w3-mobile w3-container w3-padding w3-round" :class="q.correct ? 'w3-theme-l3': 'w3-pale-red'">
                  <span class="w3-tag w3-theme w3-round">{{qIndex + 1}}</span>
                  <b>{{q.title}}</b>
                  <span class="w3-tag w3-theme-l4 w3-round">{{q.point}}</span>
                  <span v-if="q.corrects.length > 1" class="w3-tag w3-red w3-round">M</span>
                  <span class="w3-tag w3-theme-l4 w3-round" v-else>คะแนน</span>
                </label>
                <br/>
                <template v-if="q.corrects.length > 1">
                  <template v-for="(option, i) in q.options">
                    <label class="w3-block w3-mobile">
                      <input class="w3-check" type="checkbox" v-model="q.selected" :name="q.id" :value="option" :disabled="q.disabled">
                      {{option}}
                    </label>
                  </template>
                </template>
                <template v-else>
                  <template v-for="(option, i) in q.options">
                    <label class="w3-block w3-mobile">
                      <input class="w3-radio" type="radio" v-model="q.selected" :name="q.id" :value="option" :disabled="q.disabled">
                      {{option}}
                    </label>
                  </template>
                  <br/>
                </template>
              </div>
            </div>
          </div>
        </main>   
        <footer v-if="selectedQuestions">
          <div class="w3-container w3-theme">
            <p class="w3-center w3-mobile">
              <center>
                Copyright © 2019-present by Chatrawichai Chanprom | ลิขสิทธิ์และพัฒนาโดย นายชาติระวีไชย จันทร์พร้อม
              </center>
            </p>
          </div>
        </footer>
        <div class="message" v-if="message">
          <div class="w3-card">
            <div class="w3-padding" :class="message.type=='Error' ? 'w3-red': 'w3-theme'">
              {{message.type}}
            </div>
            <div class="w3-padding">
              <p class="w3-small">
                {{message.message}}
              </p>
              <button class="w3-button w3-round" :class="message.type=='Error' ? 'w3-red': 'w3-theme'" @click="closeMessageBox">
                OK
              </button>
            </div>
          </div>
        </div> 
        <div class="message loading" v-if="submitting">
        </div>    
      </div>
    </main>

	<script async defer src="https://apis.google.com/js/api.js" onload="gapiLoaded()"></script>
	<script>
	  function gapiLoaded() {
        gapi.load('client', intializeGapiClient)
	  }
	  
	  async function intializeGapiClient() {
        await gapi.client.init({
          apiKey: API_KEY,
          discoveryDocs: DISCOVERY_DOCS,
        })
        gapiInited = true
      }
	</script>
	
	<script async defer src="https://accounts.google.com/gsi/client" onload="gisLoaded()"></script>
	<script>
	  function gisLoaded() {
        tokenClient = google.accounts.oauth2.initTokenClient({
          client_id: CLIENT_ID,
          scope: SCOPES,
          callback: '', // defined later
        })
        gisInited = true
      }
	</script>
	
	<script>
	  function authorize() {
        tokenClient.callback = async function(resp) {
          if (resp.error !== undefined) {
            throw (resp)
          }
          console.log("Signed in successfully.")
        }
        if (gapi.client.getToken() === null) {
          tokenClient.requestAccessToken({prompt: 'consent'})
        } 
		else {
          tokenClient.requestAccessToken({prompt: 'none'})
        }
      }
	</script>

ามรู้ทางโภชนาการ (กรณีที่มีการแสดงฉลากโภชนาการ)',1,false,''],['Q19','“การแสดงฉลากอาหาร” มีความสำคัญอย่างไร','ค. เป็นเครื่องมือในการเลือกซื้อของผู้บริโภค',1,false,''],['Q19','“การแสดงฉลากอาหาร” มีความสำคัญอย่างไร','ง. ถูกทุกข้อ',1,true,''],['Q20','ข้อใดคือความหมายของอาหารตามพระราชบัญญัติอาหาร พ.ศ. 2522','ก. วัตถุทุกชนิดที่คนกิน ดื่ม อม หรือนําเข้าสู่ร่างกาย และรวมถึงยา',1,false,''],['Q20','ข้อใดคือความหมายของอาหารตามพระราชบัญญัติอาหาร พ.ศ. 2522','ข. วัตถุเจือปนอาหาร สี และเครื่องปรุงแต่งกลิ่นรส',1,false,''],['Q20','ข้อใดคือความหมายของอาหารตามพระราชบัญญัติอาหาร พ.ศ. 2522','ค. วัตถุทุกชนิดที่คนกิน ดื่ม อม หรือนําเข้าสู่ร่างกาย ไม่รวมถึงยา วัตถุออกฤทธิ์ต่อจิตและประสาท',1,false,''],['Q20','ข้อใดคือความหมายของอาหารตามพระราชบัญญัติอาหาร พ.ศ. 2522','ง. ข้อ ข และ ค ถูก',1,true,'']]

        let questions = {}

        for (let i = 1; i < values.length; i ++) {
          let rowData = values[i]
          let key     = rowData[0]
          let title   = rowData[1]
          let option  = rowData[2]
          let point   = rowData[3]
          let correct = rowData[4]

          if (questions[key]) {
            questions[key].options.push(option)

            if (correct) questions[key].corrects.push(option) 
          }

          else {
            questions[key] = {
              id: key,
              title: title,
              options: [option],
              point: point,
              corrects: correct ? [option]:[],
              selected: [],
              disabled: false,
              correct: true,
            }
          }
        }

        questions = Object.keys(questions).map(function(key) {
          return questions[key]
        })

        return questions
      }

    <script>
      function randomSelectArray(arr, count) {
        if (count > arr.length) count = arr.length

        let newArr = []

        let data = arr.slice()

        for (let i = 0; i < count; i ++) {
          let newItem = data.splice(Math.floor(Math.random() * data.length), 1)
          newArr = newArr.concat(newItem)
        }

        return newArr
      }
    </script>
      
    <script>
      function formatTime(seconds) {
        let h = Math.floor(seconds / 3600)
        if (h < 10) h = "0" + h 

        let m = Math.floor((seconds % 3600) / 60)
        if (m < 10) m = "0" + m 

        let s = (seconds % 3600) % 60
        if (s < 10) s = "0" + s 

        return [h, m, s].join(":")
      }
    </script>

    <script>
      let data = {
        message: null,
        submitting: false,
        start: false,
        title: "แบบทดสอบความรู้หลักสูตรการอบรมผู้สัมผัสอาหาร ตามกฏกระทรวงสุขลักษณะของสถานที่จำหน่ายอาหาร พ.ศ. ๒๕๖๑",
        countDown: null,
        counter: 0,
        ID: "",
        config: {
          time: 30,
          count: 20
        },
        question: question(),
        selectedQuestions: null,
        showWelcome: true,
        showSidebar: false,
      }
    </script>

    <script>
      let computed = {
        timer: function() {
          return formatTime(this.counter)
        }
      }
    </script>

    <script>
      let methods = {
	    handleAuth: function() {
		  this.showWelcome = false
		  authorize()
		},
		
        startQuiz: function() {
		  if (this.ID === "") {
            Swal.fire({
              icon: "warning",
              title: "คำเตือน",
              text: "กรุณาพิมพ์ ชื่อ - สกุล ของท่านก่อนทำแบบทดสอบด้วยครับ/ค่ะ",
            })
          }

          else {
            this.start = true

            this.counter = this.config.time * 60

            let selectedQuestions = randomSelectArray(this.question, this.config.count)

            selectedQuestions.forEach(function(item) {
              item.disabled = false
              item.selected = []
              item.correct = true
            })
            
            this.selectedQuestions = selectedQuestions
            
            this.countDown = setInterval(function() {
              this.counter -= 1 

              if (this.counter === 0) {
                clearInterval(this.countDown)

                this.endQuiz()
              }

            }.bind(this), 1000)
          }
        },

        endQuiz: function() { 
          this.start = false

          this.submitting = true

          clearInterval(this.countDown)

          let totalScore = 0

          let tempArray 
          
          this.selectedQuestions.forEach(function(q) {
            if (typeof(q.selected) !== "object") tempArray = [q.selected] 

            else tempArray =  [... q.selected] 

            if (tempArray.join() == q.corrects.join()) {
              q.correct = true
              totalScore += q.point
            }

            else q.correct = false 
            
            q.disabled = true
          })

          let result = [totalScore, this.ID]

          Swal.fire({
            icon: 'info', 
            title: 'กำลังประมวลผล กรุณารอสักครู่ !!!', 
            timerProgressBar: true, 
            allowOutsideClick: false, 
            didOpen: function() {
              Swal.showLoading()
            }
          }) 
		  
		  

          google.script.run
            .withSuccessHandler(function(data) {
              this.submitting = false

              if (data.res == 'pass') {
                Swal.fire({
                  icon: 'success', 
                  title: 'ผลการทดสอบ', 
                  html: `${this.ID} ทำคะแนนได้ ${totalScore}/20 คะแนน<br/>(ทำคะแนนได้มากกว่า 16 คะแนน จึงถือว่า <b>"ผ่าน"</b>)<br/><br/> <a href='${data.url}'>ดาวน์โหลดไฟล์เกียรติบัตร</a> </span>`, 
                  confirmButtonText: 'OK',
                })
              } 

              else if (data.res == 'fail') {
                Swal.fire({
                  icon: 'error', 
                  title: 'ผลการทดสอบ', 
                  html: `${this.ID} ทำคะแนนได้ ${totalScore}/20 คะแนน<br/>(ทำคะแนนได้น้อยกว่า 16 คะแนน จึงถือว่า <b>"ไม่ผ่าน"</b>)</span>`, 
                  confirmButtonText: 'OK',
                })
              }

              this.ID = ""

            }.bind(this))
          .withFailureHandler(function(e) {
            this.submitting = false

            this.message = {
              type: "Error",
              message: e.message
            }

          }.bind(this))
        .saveData(result)

        },

        closeMessageBox: function() {
          this.message = null
        }
      }
    </script>   

    <script>
      new Vue({
        el: "#app",
        data,
        computed,
        methods
      })
    </script>
  </body>
